# Secrets are managed directly in the cluster via kubectl.
# tailscale-auth: TS_AUTHKEY for Tailscale sidecar
# livekit-secrets: LIVEKIT_API_KEY + LIVEKIT_API_SECRET
#
# To recreate:
#   kubectl create secret generic tailscale-auth --namespace claude-assistant --from-literal=TS_AUTHKEY='<key>'
#   kubectl create secret generic livekit-secrets --namespace claude-assistant --from-literal=LIVEKIT_API_KEY='devkey' --from-literal=LIVEKIT_API_SECRET='<secret>'
---
apiVersion: v1
kind: Secret
metadata:
  name: tailscale-auth
  namespace: claude-assistant
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: livekit-secrets
  namespace: claude-assistant
type: Opaque
