apiVersion: v1
kind: Service
metadata:
  name: livekit-server
  namespace: claude-assistant
  labels:
    app: livekit-server
spec:
  selector:
    app: livekit-server
  ports:
    - name: signal
      port: 7880
      targetPort: 7880
      protocol: TCP
    - name: rtc-tcp
      port: 7881
      targetPort: 7881
      protocol: TCP
