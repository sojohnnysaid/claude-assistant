apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: claude-assistant

resources:
  - deployment.yaml
  - service.yaml
  - nginx-config.yaml
  - livekit-deployment.yaml
  - livekit-service.yaml
  - livekit-config.yaml
  - livekit-secrets.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: claude-assistant
    includeSelectors: false
