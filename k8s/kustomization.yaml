apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: claude-assistant

resources:
  - deployment.yaml
  - service.yaml
  - nginx-config.yaml
  # LiveKit resources are in the 'livekit' namespace — managed separately
  # See k8s/livekit-*.yaml files, applied directly via kubectl

labels:
  - pairs:
      app.kubernetes.io/part-of: claude-assistant
    includeSelectors: false
