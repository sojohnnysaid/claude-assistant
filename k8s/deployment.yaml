apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-assistant
  namespace: claude-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-assistant
  template:
    metadata:
      labels:
        app: claude-assistant
    spec:
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      containers:
      - name: frontend
        image: ghcr.io/sojohnnysaid/claude-assistant:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
