apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-server
  namespace: livekit
  labels:
    app: livekit-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit-server
  template:
    metadata:
      labels:
        app: livekit-server
    spec:
      serviceAccountName: tailscale
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        # LiveKit server
        - name: livekit
          image: livekit/livekit-server:latest
          args:
            - --config
            - /etc/livekit/livekit.yaml
          ports:
            - containerPort: 7880
              name: signal
            - containerPort: 7881
              name: rtc-tcp
          volumeMounts:
            - name: livekit-config
              mountPath: /etc/livekit
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi

        # Tailscale sidecar — gives LiveKit a tailnet IP
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:latest
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_HOSTNAME
              value: livekit-server
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_USERSPACE
              value: "false"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
            - name: dev-tun
              mountPath: /dev/net/tun

      volumes:
        - name: livekit-config
          configMap:
            name: livekit-config
        - name: tailscale-state
          emptyDir: {}
        - name: dev-tun
          hostPath:
            path: /dev/net/tun
