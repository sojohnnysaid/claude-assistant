apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale
  namespace: livekit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale
  namespace: livekit
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale
  namespace: livekit
subjects:
  - kind: ServiceAccount
    name: tailscale
    namespace: livekit
roleRef:
  kind: Role
  name: tailscale
  apiGroup: rbac.authorization.k8s.io
